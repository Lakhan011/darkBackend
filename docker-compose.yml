version: '3.8'

services:
  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - MONGO_URI=mongodb://mongodb:27017/ecommerce
      - JWT_SECRET=your_super_secret_jwt_key_change_in_production_2024
      - CLIENT_URL=http://localhost:4200
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      mongodb:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - ecommerce-network

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - ecommerce-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ecommerce-network

volumes:
  mongodb_data:
  redis_data:

networks:
  ecommerce-network:
    driver: bridge
